[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=/usr/local/sbin/php-fpm --nodaemonize
priority=5
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/proc/self/fd/1

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
priority=10
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/proc/self/fd/1
