name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    if: ${{ hashFiles('composer.json') != '' }}
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wps_payroll_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: '8.3'
          extensions: intl, mbstring, pdo_mysql, bcmath
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run test suite
        run: |
          if composer show pestphp/pest > /dev/null 2>&1; then
            vendor/bin/pest --ci
          elif [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "No PHP test runner detected. Skipping."
          fi

      - name: Upload coverage (artifact)
        if: always() && (hashFiles('storage/logs/junit.xml') != '' || hashFiles('coverage/coverage.xml') != '')
        uses: actions/upload-artifact@v4
        with:
          name: php-test-artifacts
          path: |
            storage/logs/junit.xml
            coverage/

  build:
    if: ${{ hashFiles('composer.json') != '' }}
    name: Build Release Artifact
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: '8.3'
          extensions: intl, mbstring, pdo_mysql, bcmath

      - name: Install Composer dependencies (production)
        run: composer install --prefer-dist --no-dev --no-progress --no-interaction

      - name: Setup Node (if frontend present)
        if: ${{ hashFiles('package-lock.json') != '' || hashFiles('yarn.lock') != '' || hashFiles('pnpm-lock.yaml') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build frontend assets
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
          else
            npm install
          fi
          npm run build || yarn build || pnpm build || echo "No build script found. Skipping."
          rm -rf node_modules

      - name: Optimise Laravel caches
        run: |
          if [ -f artisan ]; then
            php artisan config:cache || true
            php artisan route:cache || true
            php artisan view:cache || true
          else
            echo "artisan not found. Skipping Laravel optimisation."
          fi

      - name: Create release archive
        run: |
          tar --exclude='./.git' \
              --exclude='./storage/logs' \
              --exclude='./tests' \
              --exclude='./docs' \
              --exclude='./.github/workflows' \
              -czf app-release.tar.gz .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app-release.tar.gz
          if-no-files-found: error
